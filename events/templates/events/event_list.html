<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>جميع الأحداث</title>
</head>
<body>
    <h1>جميع الأحداث</h1>
    <ul>
        {% for event in events %}
            <li>
                <a href="/events/{{ event.id }}/">{{ event.name }}</a> - {{ event.start_date }}
            </li>
        {% empty %}
            <li>لا توجد أحداث حالياً.</li>
        {% endfor %}
    </ul>
    <a href="/">العودة إلى الصفحة الرئيسية</a>
</body>
</html>
